<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self'" />
    <title>Leonardo</title>
    <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <img class="logo" src="./img/logo.png" alt="Leonardo" />
            <span class="title">Leonardo DaVinci</span>
        </div>
        <div class="actions">
            <button id="resetChat" class="icon-btn" title="New chat">⟳</button>
            <button id="gear" class="icon-btn" title="Settings">⚙</button>
        </div>
    </header>

    <section id="settings" class="settings hidden">
        <div class="mode-row">
            <button id="modeApi" class="mode-btn" type="button">API key</button>
            <button id="modeMax" class="mode-btn" type="button">Max (subscription)</button>
        </div>

        <div id="apiFields">
            <label for="keyInput">Anthropic API key</label>
            <input id="keyInput" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
        </div>

        <div id="maxFields" class="hidden">
            <label for="oauthInput">Max OAuth token (claude setup-token)</label>
            <input id="oauthInput" type="password" placeholder="sk-ant-oat..." autocomplete="off" spellcheck="false" />
            <span class="hint">In Terminal, run <b>claude setup-token</b> and paste the token. Requires Claude Code installed and an active Max/Pro subscription. If you're already logged in to Claude Code, you can leave this field empty.</span>
        </div>

        <div class="settings-row">
            <button id="saveSettings" class="primary" type="button">Save</button>
            <span class="hint">Stored locally in ~/.leonardo.json</span>
        </div>
    </section>

    <main id="transcript" class="transcript"></main>

    <div id="status" class="status"></div>

    <footer class="composer">
        <textarea id="input" rows="1" placeholder="Type what to do in Resolve…  (Enter to send, Shift+Enter for a new line)"></textarea>
        <button id="send" class="send" title="Send">▶</button>
    </footer>

    <script src="./renderer.js"></script>
</body>
</html>
